# GeoShift — Mihomo proxy config. Upstreams: SOCKS5 127.0.0.1:1080 (US tunnel), 127.0.0.1:1081 (JP tunnel).
# Dashboard / API: external-controller binds 127.0.0.1:9090 only (not reachable from LAN/internet).

mode: rule
log-level: info
ipv6: false

# systemd-resolved often uses router DNS (bypassing Mihomo fake-IP), so apps see real IPs and
# DOMAIN rules would never match → everything fell through to MATCH,DIRECT. Sniff TLS SNI / HTTP
# Host so claude.ai / platform.claude.com still hit US-PROXY even when connecting by IP.
sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: true
  force-dns-mapping: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
    # HTTP/3 (QUIC) uses UDP/443; without this, browsers hit CDN IPs as DIRECT → HK IP → geo block.
    QUIC:
      ports: [443]

# REST API + web UI at http://127.0.0.1:9090/ui (after one-time panel fetch; see below).
external-controller: 127.0.0.1:9090
external-ui: ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"
external-controller-cors:
  allow-origins:
    - "*"
  allow-private-network: true
# First run: download panel into external-ui — PowerShell:
#   Invoke-RestMethod -Method Post -Uri http://127.0.0.1:9090/upgrade/ui
# Or use hosted UI: https://yacd.metacubex.one/?hostname=127.0.0.1&port=9090

port: 7890
socks-port: 7891
allow-lan: false

proxies:
  - name: US-TUNNEL
    type: socks5
    server: 127.0.0.1
    port: 1080
    udp: true
  - name: JP-TUNNEL
    type: socks5
    server: 127.0.0.1
    port: 1081
    udp: true  # SSH tunnels only carry TCP; QUIC attempts will fail with EOF and browser falls back to HTTP/2 TCP
  # NordVPN HTTPS proxy (port 89) - use for sites that block cloud/datacenter IPs (e.g. Abema).
  # NordVPN has no Japan SOCKS5 servers (only NL/SE/US/IE). Japan exits use *.proxy.nordvpn.com.
  # Pick a JP server: api.nordvpn.com/v1/servers/recommendations?filters[country_id]=108
  #   &filters[servers_technologies][identifier]=proxy_ssl&limit=1 -> technologies metadata proxy_hostname.
  # Credentials: nordaccount.com -> NordVPN -> Manual Setup -> Service credentials (not login password).
  - name: NordVPN-JP
    type: http
    server: jp874.proxy.nordvpn.com
    port: 89
    tls: true
    username: "YOUR_NORDVPN_SERVICE_USERNAME"
    password: "YOUR_NORDVPN_SERVICE_PASSWORD"
    udp: false

proxy-groups:
  - name: US-PROXY
    type: select
    proxies:
      - US-TUNNEL
      - DIRECT
  - name: JP-PROXY
    type: select
    proxies:
      - JP-TUNNEL
      - NordVPN-JP
      - DIRECT
  # JP-STRICT: for sites that block cloud/datacenter IPs (e.g. Abema).
  # Default is NordVPN-JP; fall back to JP-TUNNEL via dashboard if NordVPN is down.
  - name: JP-STRICT
    type: select
    proxies:
      - NordVPN-JP
      - JP-TUNNEL
      - DIRECT

# Rule sets loaded from files in config/rules/.
# To add domains: edit the appropriate *.yaml file, commit, then run:
#   geoshift sync && geoshift reload   (on each device — no tunnel restart needed)
#
# Rule file guide:
#   jp-strict.yaml  -> JP-STRICT (NordVPN-JP) : sites that block datacenter IPs
#   jp-content.yaml -> JP-PROXY  (JP-TUNNEL)  : general JP content
#   us-ai.yaml      -> US-PROXY  (US-TUNNEL)  : US AI services
rule-providers:
  us-ai:
    type: file
    behavior: classical
    path: ./rules/us-ai.yaml
  jp-strict:
    type: file
    behavior: classical
    path: ./rules/jp-strict.yaml
  jp-content:
    type: file
    behavior: classical
    path: ./rules/jp-content.yaml

rules:
  # ssh.exe runs the SOCKS5 tunnel processes themselves. With auto-route: true,
  # all traffic including ssh.exe's own connections to the exit nodes goes through
  # TUN. Mihomo routes them as MATCH,DIRECT but the return packets re-enter TUN,
  # creating a routing loop (banner exchange: Connection to UNKNOWN port -1).
  # This rule bypasses TUN/proxy entirely for ssh.exe so reconnections work.
  - PROCESS-NAME,ssh.exe,DIRECT
  - RULE-SET,us-ai,US-PROXY
  - RULE-SET,jp-strict,JP-STRICT
  - RULE-SET,jp-content,JP-PROXY
  - MATCH,DIRECT

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  mtu: 1500
  strict-route: false
  dns-hijack:
    - any:53

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # Upstream proxy hostnames must resolve to real IPs, not fake-ip (198.18.x.x).
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fake-ip-filter:
    - '+.nordvpn.com'
    - '+.nordhold.net'
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
